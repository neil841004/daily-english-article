<title>英文閱讀庫</title>
<style>
:root {
  color-scheme: light;
  --page: #f5f6f1;
  --panel: #ffffff;
  --ink: #20231f;
  --muted: #667064;
  --line: #d9ded2;
  --accent: #0f766e;
  --accent-soft: #e8f4f1;
  --done: #7c5c13;
  --shadow: 0 18px 44px rgba(23, 32, 29, .12);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--page);
  color: var(--ink);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
}
button, input { font: inherit; }
button:disabled, input:disabled { opacity: .55; cursor: not-allowed; }
.app-shell {
  display: grid;
  grid-template-columns: 330px minmax(0, 1fr);
  height: 100vh;
  min-height: 640px;
  transition: grid-template-columns .22s ease;
}
.app-shell.sidebar-collapsed { grid-template-columns: 58px minmax(0, 1fr); }
.sidebar {
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--line);
  background: rgba(255, 255, 255, .82);
  backdrop-filter: blur(12px);
}
.sidebar-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 38px;
  gap: 10px;
  align-items: center;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--line);
}
.brand { min-width: 0; }
.brand h1 { margin: 0; font-size: 1.18rem; line-height: 1.2; letter-spacing: 0; }
.brand p { margin: 5px 0 0; color: var(--muted); font-size: .86rem; }
.icon-button {
  display: inline-grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(15, 118, 110, .22);
  border-radius: 7px;
  background: var(--panel);
  color: var(--accent);
  cursor: pointer;
}
.icon-button:hover { background: var(--accent-soft); }
.article-list {
  overflow: auto;
  padding: 10px 10px 18px;
}
.article-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  width: 100%;
  margin: 0 0 6px;
  padding: 11px 12px;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: inherit;
  text-align: left;
  cursor: pointer;
}
.article-item:hover { background: rgba(15, 118, 110, .08); }
.article-item.active { background: var(--accent-soft); box-shadow: inset 3px 0 0 var(--accent); }
.article-date { display: block; color: var(--muted); font-size: .78rem; line-height: 1.25; }
.article-title-row { display: flex; align-items: center; gap: 7px; min-width: 0; }
.article-title { display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 750; line-height: 1.35; }
.article-tag { flex: 0 0 auto; display: inline-flex; align-items: center; min-height: 19px; border: 1px solid rgba(15, 118, 110, .24); border-radius: 3px; background: #e8f4f1; color: var(--accent); padding: 1px 5px; font-size: .68rem; font-weight: 850; line-height: 1.1; }
.article-item.done {
  background: #eef1e8;
  color: #586052;
}
.article-item.done:hover { background: #e7ebe0; }
.article-item.done.active {
  background: #e5ece5;
  box-shadow: inset 3px 0 0 rgba(15, 118, 110, .32);
}
.article-item.done .article-date { color: #7b8375; }
.article-item.done .article-title { color: #586052; font-weight: 650; }
.article-item.done .article-tag { border-color: rgba(88, 96, 82, .24); background: #f5f6f0; color: #687260; }
.sidebar-foot {
  display: grid;
  gap: 10px;
  margin-top: auto;
  padding: 12px 14px 16px;
  border-top: 1px solid var(--line);
}
.settings-button {
  justify-content: center;
  width: 100%;
}
.text-button {
  border: 1px solid rgba(15, 118, 110, .24);
  border-radius: 7px;
  background: var(--accent);
  color: white;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: 750;
}
.text-button.secondary { background: #fff; color: var(--accent); }
.sync-status { min-height: 1.2em; margin: 8px 0 0; color: var(--muted); font-size: .82rem; }
.settings-dialog {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  place-items: center;
  padding: 22px;
  background: rgba(21, 28, 25, .42);
}
.settings-dialog.open { display: grid; }
.settings-panel {
  width: min(460px, 100%);
  border: 1px solid rgba(15, 118, 110, .2);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow);
}
.settings-panel header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}
.settings-panel h2 { margin: 0; font-size: 1.08rem; line-height: 1.25; letter-spacing: 0; }
.settings-body { display: grid; gap: 12px; padding: 16px 18px 18px; }
.settings-body label { color: var(--muted); font-size: .86rem; }
.settings-body input {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  color: var(--ink);
  padding: 10px 11px;
}
.settings-actions { display: flex; gap: 8px; justify-content: flex-end; }
.viewer-pane {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  min-width: 0;
}
.viewer-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 58px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(245, 246, 241, .88);
  backdrop-filter: blur(12px);
}
.viewer-title { min-width: 0; }
.viewer-title strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 1rem; }
.viewer-title span { color: var(--muted); font-size: .82rem; }
.viewer-frame {
  width: 100%;
  height: 100%;
  border: 0;
  background: #fff;
}
.sidebar-collapsed .brand,
.sidebar-collapsed .article-list,
.sidebar-collapsed .sidebar-foot { display: none; }
.sidebar-collapsed .sidebar-head {
  grid-template-columns: 1fr;
  padding: 12px 9px;
  border-bottom: 0;
}
@media (max-width: 820px) {
  .app-shell { grid-template-columns: minmax(260px, 82vw) minmax(0, 1fr); }
  .app-shell.sidebar-collapsed { grid-template-columns: 52px minmax(0, 1fr); }
  .viewer-toolbar { padding: 9px 12px; }
}
</style>
</head>

    <div class="sidebar-foot">

  <main class="viewer-pane">
    <div class="viewer-toolbar">

</div>
<div class="settings-dialog" data-settings-dialog role="dialog" aria-modal="true" aria-labelledby="settings-title">

      <h2 id="settings-title">同步設定</h2>

    <div class="settings-body">

      <div class="settings-actions">

</div>

const app = document.querySelector('[data-app]');
const list = document.querySelector('[data-article-list]');
const viewer = document.querySelector('[data-viewer]');
const titleNode = document.querySelector('[data-current-title]');
const dateNode = document.querySelector('[data-current-date]');
const statusNode = document.querySelector('[data-sync-status]');
const settingsStatusNode = document.querySelector('[data-settings-status]');
const settingsDialog = document.querySelector('[data-settings-dialog]');
const passwordInput = document.querySelector('[data-sync-password]');
const syncEnabledKey = 'englishCoach.syncEnabled';
const articleStatesKey = 'englishCoach.articleStates';
const savedWordsKey = 'englishCoach.savedWords';
let currentArticle = articles[0];
let syncEnabled = localStorage.getItem(syncEnabledKey) === 'true';
let articleStates = readJson(articleStatesKey, {});
let savedWords = new Map(readJson(savedWordsKey, []).map(function (item) {
  return [normalizeWord(item.normalized || item.word), item];
}).filter(function (pair) {
  return pair[0];
}));
function readJson(key, fallback) {
  try {
    const value = localStorage.getItem(key);
    return value ? JSON.parse(value) : fallback;
  } catch (error) {
    return fallback;
  }
}
function writeJson(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (error) {}
}
function normalizeWord(raw) {
  return String(raw || '').toLowerCase().trim().replace(/^'+|'+$/g, '');
}
function setStatus(text) {
  statusNode.textContent = text;
  settingsStatusNode.textContent = text;
}
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, function (char) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
  });
}
function renderList() {
  list.innerHTML = articles.map(function (article) {
    const done = !!articleStates[article.id];
    return '<button type="button" class="article-item' + (article.id === currentArticle.id ? ' active' : '') + (done ? ' done' : '') + '" data-article-id="' + article.id + '">' +
      '<span class="article-date">' + escapeHtml(article.date) + '</span><span class="article-title-row"><span class="article-title">' + escapeHtml(article.title) + '</span><span class="article-tag">' + escapeHtml(article.tag || '') + '</span></span></button>';
  }).join('');
}
function selectArticle(article) {
  currentArticle = article;
  titleNode.textContent = article.title;
  dateNode.textContent = article.date;
  viewer.src = article.file;
  renderList();
}
function sendStateToArticle() {
  if (!viewer.contentWindow) return;
  viewer.contentWindow.postMessage({ type: 'english-coach:sync-state', enabled: syncEnabled }, '*');
  viewer.contentWindow.postMessage({ type: 'english-coach:saved-words', words: Array.from(savedWords.values()) }, '*');
  viewer.contentWindow.postMessage({ type: 'english-coach:article-states', articles: articleStates }, '*');
}
function saveLocalState() {
  writeJson(articleStatesKey, articleStates);
  writeJson(savedWordsKey, Array.from(savedWords.values()));
}
async function sendCloudCommand(command, payload) {
  if (!syncEnabled) {
    setStatus('同步尚未開啟，已存於本機。');
    return;
  }
  try {
    const result = await jsonpRequest({ action: 'write', command: command, payload: JSON.stringify(payload) });
    setStatus(result && result.ok ? '已同步到 Google Sheet。' : '同步回應異常，已保留於本機。');
  } catch (error) {
    setStatus('同步送出失敗，已保留於本機。');
  }
}
function applyArticleDone(article, done, shouldSync) {
  articleStates[article.id] = !!done;
  saveLocalState();
  renderList();
  sendStateToArticle();
  if (shouldSync) sendCloudCommand('setArticleDone', { article: article, done: !!done });
}
function applySaveWord(entry, shouldSync) {
  const key = normalizeWord(entry.normalized || entry.word);
  if (!key || savedWords.has(key)) return;
  const value = Object.assign({}, entry, { normalized: key, savedAt: entry.savedAt || new Date().toISOString() });
  savedWords.set(key, value);
  saveLocalState();
  sendStateToArticle();
  if (shouldSync) sendCloudCommand('saveWord', value);
}
function applyRemoveWord(entry, shouldSync) {
  const key = normalizeWord(entry.normalized || entry.word);
  if (!key) return;
  savedWords.delete(key);
  saveLocalState();
  sendStateToArticle();
  if (shouldSync) sendCloudCommand('removeSavedWord', { normalized: key, word: entry.word || key });
}
function jsonpRequest(params) {
  return new Promise(function (resolve, reject) {
    const callbackName = 'englishCoachCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const script = document.createElement('script');
    let timer = null;
    const query = Object.keys(params || {}).map(function (key) {
      return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
    }).join('&');
    const separator = cloudEndpoint.includes('?') ? '&' : '?';
    function cleanup() {
      delete window[callbackName];
      script.remove();
      if (timer) clearTimeout(timer);
    }
    window[callbackName] = function (data) {
      cleanup();
      resolve(data || {});
    };
    script.onerror = function () {
      cleanup();
      reject(new Error('JSONP failed'));
    };
    timer = setTimeout(function () {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 12000);
    script.src = cloudEndpoint + separator + query + '&callback=' + encodeURIComponent(callbackName);
    document.head.appendChild(script);
  });
}
async function refreshCloud() {
  if (!syncEnabled) {
    setStatus('同步尚未開啟，資料會先存於本機。');
    return;
  }
  setStatus('正在讀取 Google Sheet...');
  try {
    const data = await jsonpRequest({ action: 'list' });
    articleStates = Object.assign({}, articleStates, data.articles || {});
    savedWords = new Map((data.words || Array.from(savedWords.values())).map(function (item) {
      return [normalizeWord(item.normalized || item.word), item];
    }).filter(function (pair) {
      return pair[0];
    }));
    saveLocalState();
    renderList();
    sendStateToArticle();
    setStatus('已讀取 Google Sheet。');
  } catch (error) {
    setStatus('無法讀取雲端資料，請確認 Apps Script 已更新並重新部署。');
  }
}
async function syncArticleCatalog() {
  if (!syncEnabled) return;
  await sendCloudCommand('syncArticles', { articles: articles });
}
async function unlockSync() {
  if (passwordInput.value !== syncPassword) {
    setStatus('密碼不正確。');
    passwordInput.select();
    return;
  }
  syncEnabled = true;
  localStorage.setItem(syncEnabledKey, 'true');
  passwordInput.value = '';
  settingsDialog.classList.remove('open');
  sendStateToArticle();
  setStatus('同步已開啟，正在連線...');
  await syncArticleCatalog();
  await refreshCloud();
}
list.addEventListener('click', function (event) {
  const item = event.target.closest('[data-article-id]');
  if (!item) return;
  const article = articles.find(function (entry) { return entry.id === item.dataset.articleId; });
  if (article) selectArticle(article);
});
document.querySelector('[data-toggle-sidebar]').addEventListener('click', function () {
  const collapsed = app.classList.toggle('sidebar-collapsed');
  this.setAttribute('aria-label', collapsed ? '展開文章列表' : '收合文章列表');
  this.title = collapsed ? '展開文章列表' : '收合文章列表';
});
document.querySelector('[data-open-article]').addEventListener('click', function () {
  window.open(currentArticle.file, '_blank');
});
document.querySelector('[data-open-settings]').addEventListener('click', function () {
  settingsDialog.classList.add('open');
  passwordInput.focus();
});
document.querySelector('[data-close-settings]').addEventListener('click', function () {
  settingsDialog.classList.remove('open');
});
document.querySelector('[data-unlock-sync]').addEventListener('click', unlockSync);
passwordInput.addEventListener('keydown', function (event) {
  if (event.key === 'Enter') unlockSync();
});
settingsDialog.addEventListener('click', function (event) {
  if (event.target === settingsDialog) settingsDialog.classList.remove('open');
});
document.querySelector('[data-refresh-cloud]').addEventListener('click', refreshCloud);
viewer.addEventListener('load', sendStateToArticle);
window.addEventListener('message', function (event) {
  const message = event.data || {};
  if (message.type === 'english-coach:article-ready') {
    sendStateToArticle();
    return;
  }
  if (message.type !== 'english-coach:data') return;
  if (!syncEnabled) {
    setStatus('請先在設定輸入密碼開啟同步。');
    sendStateToArticle();
    return;
  }
  if (message.command === 'setArticleDone') {
    applyArticleDone(message.payload.article, message.payload.done, true);
  }
  if (message.command === 'saveWord') {
    applySaveWord(message.payload, true);
  }
  if (message.command === 'removeSavedWord') {
    applyRemoveWord(message.payload, true);
  }
});
renderList();
selectArticle(currentArticle);
if (syncEnabled) {
  setStatus('同步已開啟，正在連線...');
  syncArticleCatalog().then(refreshCloud);
} else {
  setStatus('同步尚未開啟，資料會先存於本機。');
}
</script>
</body>
</html>
